<body>
    <h1>杜甫诗三首</h1>
    <div class="box">
        <div class="box1">
            <a href="https://wenku.baidu.com/view/1b251ddaadf8941ea76e58fafab069dc50224716.html"  title="点击查看赏析" target="_BLANK">秋兴八首（其一）</a>
            <p>玉露凋伤枫树林，</p>
            <p>巫山巫峡气萧森。</p>
            <p>江间波浪兼天涌，</p>
            <p>塞上风云接地阴。</p>
            <p>丛菊两开他日泪，</p>
            <p>孤舟一系故园心。</p>
            <p>寒衣处处催刀尺，</p>
            <p>白帝城高急暮砧。</p>
        </div>
        <div class="box2">
            <a href="https://wenku.baidu.com/view/d95347807a3e0912a21614791711cc7930b7780e.html" title="点击查看赏析" target="_BLANK">登高</a>
            <p>风急天高猿啸哀，</p>
            <p>渚清沙白鸟飞回。</p>
            <p>无边落木萧萧下，</p>
            <p>不尽长江滚滚来。</p>
            <p>万里悲秋常作客，</p>
            <p>百年多病独登台。</p>
            <p>艰难苦恨繁霜鬓，</p>
            <p>潦倒新停浊酒杯。</p>
        </div>
        <div class="box3">
            <a href="https://wenku.baidu.com/view/b67e3be850ea551810a6f524ccbff121dc36c517.html" title="点击查看赏析" target="_BLANK">咏怀古迹（其三）</a>
            <p>群山万壑赴荆门，</p>
            <p>生长明妃尚有村。</p>
            <p>一去紫台连朔漠，</p>
            <p>独留青冢向黄昏。</p>
            <p>画图省识春风面，</p>
            <p>环佩空归夜月魂。</p>
            <p>千载琵琶作胡语，</p>
            <p>分明怨恨曲中论。</p>
        </div>
    </div>
</body>
</html>
